<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Check Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    padding:40px;
}

h1{
    margin-bottom:10px;
    color:#1f2937;
}

.subtitle{
    margin-bottom:30px;
    color:#6b7280;
}

.stats{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    min-width:180px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h3{
    margin-bottom:10px;
    color:#374151;
}

.card p{
    font-size:24px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

th,td{
    padding:14px;
    border:1px solid #e5e7eb;
}

th{
    background:#1f2937;
    color:white;
}

.status{
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
    display:inline-block;
}

.active{
    background:#dcfce7;
    color:#15803d;
}

.paused{
    background:#fef3c7;
    color:#b45309;
}

.down{
    background:#fee2e2;
    color:#dc2626;
}

.refresh-info{
    margin-bottom:20px;
    color:#6b7280;
}

@media(max-width:768px){
    .stats{
        flex-direction:column;
    }

    .card{
        width:100%;
    }
}

</style>
</head>
<body>

<h1>Pulse Check Dashboard</h1>

<p class="subtitle">
    Real-time monitoring dashboard for registered devices
</p>

<div class="refresh-info">
    Refreshes every 5 seconds |
    Last updated:
    <strong id="refreshTime">--</strong>
</div>

<div class="stats">

    <div class="card">
        <h3>Total Monitors</h3>
        <p id="total">0</p>
    </div>

    <div class="card">
        <h3>Active</h3>
        <p id="active">0</p>
    </div>

    <div class="card">
        <h3>Paused</h3>
        <p id="paused">0</p>
    </div>

    <div class="card">
        <h3>Down</h3>
        <p id="down">0</p>
    </div>

</div>

<table>

    <thead>
        <tr>
            <th>ID</th>
            <th>Status</th>
            <th>Timeout (Seconds)</th>
            <th>Paused</th>
        </tr>
    </thead>

    <tbody id="monitorTable"></tbody>

</table>

<script>

async function loadMonitors(){

    try{

        const response = await fetch("/monitors");

        const result = await response.json();

        const monitors = result.data || [];

        document.getElementById("total").innerText =
            monitors.length;

        document.getElementById("active").innerText =
            monitors.filter(m => m.status === "active").length;

        document.getElementById("paused").innerText =
            monitors.filter(m => m.paused).length;

        document.getElementById("down").innerText =
            monitors.filter(m => m.status === "down").length;

        document.getElementById("refreshTime").innerText =
            new Date().toLocaleTimeString();

        const table =
            document.getElementById("monitorTable");

        table.innerHTML = "";

        monitors.forEach(monitor => {

            let statusClass = monitor.status;

            if(monitor.paused){
                statusClass = "paused";
            }

            table.innerHTML += `
                <tr>
                    <td>${monitor.id}</td>

                    <td>
                        <span class="status ${statusClass}">
                            ${monitor.paused ? "paused" : monitor.status}
                        </span>
                    </td>

                    <td>${monitor.timeout}</td>

                    <td>${monitor.paused}</td>
                </tr>
            `;
        });

    }catch(error){

        console.error(error);

    }

}

loadMonitors();

setInterval(loadMonitors, 5000);

</script>

</body>
</html>
